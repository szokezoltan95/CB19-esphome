esphome:
  name: cb19-gate
  friendly_name: CB19 Gate

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  baud_rate: 0

api:

ota:
  - platform: esphome
    password: "admin123"

wifi:
  ssid: "YOUR_SSID"
  password: "YOUR_WIFI_PASSWORD"
  ap:
    ssid: "CB19 Gate Fallback"
    password: "12345678"

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/szokezoltan95/CB19-esphome
    components: [cb19_gate]

uart:
  id: gate_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600

cb19_gate:
  id: gate_controller
  uart_id: gate_uart

  pedestrian_button:
    name: "Pedestrian Open"

  open_button:
    name: "Open"

  close_button:
    name: "Close"

  stop_button:
    name: "Stop"

  reload_parameters_button:
    name: "1. Read Parameters"

  apply_parameters_button:
    name: "2. Write Parameters"

  revert_parameters_button:
    name: "3. Revert Pending Parameters"

  remote_learn_button:
    name: "4. Add Remote"

  clear_remote_learn_button:
    name: "5. Remove Remote"

  auto_learn_button:
    name: "6. Gate Auto Learn"

  factory_reset_button:
    name: "7. Factory Reset"
    disabled_by_default: true

  opening_start_percent:
    name: "Opening Start Percent"
    initial_value: 56
    min_value: 0
    max_value: 99
    step: 1

  closing_start_percent:
    name: "Closing Start Percent"
    initial_value: 44
    min_value: 1
    max_value: 100
    step: 1

  f1: { name: "F1 Motor Type" }
  f2: { name: "F2 Opening Force" }
  f3: { name: "F3 Closing Force" }
  f4: { name: "F4 Opening Speed" }
  f5: { name: "F5 Closing Speed" }
  f6: { name: "F6 Slow Speed" }
  f7: { name: "F7 Slowdown Start" }
  f8: { name: "F8 Open Wing Delay" }
  f9: { name: "F9 Close Wing Delay" }
  fa: { name: "FA Auto Close" }
  fb: { name: "FB Safety Mode" }
  fc: { name: "FC Pedestrian Mode" }
  fd: { name: "FD Flashing Lamp" }
  fe: { name: "FE Photocell 1" }
  ff: { name: "FF Photocell 2" }
  fg: { name: "FG Buzzer" }
  fh: { name: "FH Electric Lock" }
  fi: { name: "FI LED Direction" }
  fj: { name: "FJ Gate Type" }
  fk: { name: "FK Back Release" }

  learn_status:
    name: "Learn Status"
  learning_active:
    name: "Learning Active"

  param_current:
    name: "Current Param Block"
  param_pending:
    name: "Pending Param Block"
  params_dirty:
    name: "Parameters Dirty"
  config_warning:
    name: "Config Warning"

  gate_state:
    name: "Gate State"

  last_ack:
    name: "Last Ack"
  last_rs:
    name: "Last RS"

  motor1_raw:
    name: "Motor1 Raw"
  motor2_raw:
    name: "Motor2 Raw"
  motor1_position:
    name: "Motor1 Position"
  motor2_position:
    name: "Motor2 Position"
  gate_position:
    name: "Gate Position"
  motor1_speed:
    name: "Motor1 Speed"
  motor1_load:
    name: "Motor1 Load"
  motor2_speed:
    name: "Motor2 Speed"
  motor2_load:
    name: "Motor2 Load"

  moving:
    name: "Moving"
  fully_opened:
    name: "Fully Opened"
  fully_closed:
    name: "Fully Closed"
  ped_opened:
    name: "Pedestrian Opened"
  manual_stop:
    name: "Manual Stop"
  photocell_active:
    name: "Photocell"
  obstruction_active:
    name: "Obstruction"